# Goban Tile (default: 4 identical cores)

[privateDCache]
enable = false
ways = 4
capacityKB = 256
writeBytes = 8
portFactor = 2
memCycles = 10

[sharedMem]
enable = true
entries = 16384
inputChannels = 28
defaultGroupCount = 1
memCycles = 10

[coreTemplate]
include = "cores/default.toml"
count = 4
