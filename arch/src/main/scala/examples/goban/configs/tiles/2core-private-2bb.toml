# Goban Tile (2 cores: both cores have Buckyball)

[privateDCache]
enable = true
ways = 4
capacityKB = 256
writeBytes = 8
portFactor = 2
memCycles = 10

[sharedMem]
enable = false
entries = 16384
inputChannels = 14
defaultGroupCount = 1
memCycles = 10

[coreTemplate]
include = "cores/default.toml"
count = 2
