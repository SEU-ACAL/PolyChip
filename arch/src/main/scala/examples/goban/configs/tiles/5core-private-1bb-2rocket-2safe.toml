# Goban Tile (5 cores: core 0 has Buckyball, cores 1-2 are Rocket-only, cores 3-4 are safe core)

[privateDCache]
enable = true
ways = 4
capacityKB = 256
writeBytes = 8
portFactor = 2
memCycles = 10

[sharedMem]
enable = false
entries = 16384
inputChannels = 5
defaultGroupCount = 1
memCycles = 10

[[cores]]
include = "cores/default.toml"

[[cores]]
include = "cores/rocket.toml"

[[cores]]
include = "cores/rocket.toml"

[[cores]]
include = "cores/safe-core.toml"

[[cores]]
include = "cores/safe-core.toml"
